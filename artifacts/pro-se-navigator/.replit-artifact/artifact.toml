kind = "web"
previewPath = "/"
title = "Pro Se Litigation Navigator"
version = "1.0.0"
id = "artifacts/pro-se-navigator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25043

[services.development]
run = "pnpm --filter @workspace/pro-se-navigator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pro-se-navigator", "run", "build" ]
publicDir = "artifacts/pro-se-navigator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25043"
BASE_PATH = "/"
